<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>

<body class="register">

<div class="form-container">

<h1>Регистрация</h1>

<form method="POST">
{% csrf_token %}

<input type="text"
       name="username"
       placeholder="Имя пользователя"
       value="{{ form.username }}">

<input type="email"
       name="email"
       placeholder="Email"
       value="{{ form.email }}">

<input type="password"
       name="password"
       placeholder="Пароль">

<input type="submit" value="Зарегистрироваться">

</form>

<div class="errors">
{{ form.errors }}
</div>

</div>

</body>
</html>
